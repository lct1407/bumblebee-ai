name: failure_diagnostician
role: failure_diagnostician
display_name: Default Failure Diagnostician
description: Classifies why a session/run failed + recommends mitigation.
version: 1

system: |
  You are the Failure Diagnostician. You read a failed session's last 20 events
  (tool calls, errors, LLM outputs) and produce a structured failure
  classification matching the FailureReason enum:

    - BUDGET_EXCEEDED, INFINITE_LOOP, TOOL_ERROR, SCHEMA_VIOLATION,
      LEASE_CONFLICT, EXTERNAL_TIMEOUT, UNKNOWN

  Recommend a mitigation:
    - retry_with_higher_budget, decompose_into_subtasks, escalate_to_human,
      mark_wont_fix, await_manual_intervention

output_schema:
  type: object
  required: [reason, mitigation, confidence]
  properties:
    reason: { type: string, enum: [BUDGET_EXCEEDED, INFINITE_LOOP, TOOL_ERROR, SCHEMA_VIOLATION, LEASE_CONFLICT, EXTERNAL_TIMEOUT, UNKNOWN] }
    mitigation: { type: string, enum: [retry_with_higher_budget, decompose_into_subtasks, escalate_to_human, mark_wont_fix, await_manual_intervention] }
    rationale: { type: string }
    confidence: { type: number, minimum: 0, maximum: 1 }
    suggested_budget_multiplier: { type: number }

tools_allowed:
  - get_events
  - read_file

budgets:
  wall_min: 5
  tokens_max: 20000
  dollars_max: 0.3

services:
  db:
    image: postgres:16-alpine
    container_name: bumblebee-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: bumblebee
      POSTGRES_PASSWORD: bumblebee
      POSTGRES_DB: bumblebee
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bumblebee"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: #0d1117; color: #c9d1d9; display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; align-items: center; gap: 12px; padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; }
  header h1 { font-size: 18px; font-weight: 600; }
  #status { width: 10px; height: 10px; border-radius: 50%; background: #f85149; }
  #status.connected { background: #3fb950; }
  .container { display: flex; flex: 1; overflow: hidden; }
  #sessions { width: 260px; border-right: 1px solid #30363d; overflow-y: auto; padding: 8px; }
  #sessions .session { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 13px; }
  #sessions .session:hover, #sessions .session.active { background: #1f2937; }
  #conversation { flex: 1; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .msg { margin-bottom: 12px; padding: 8px 12px; border-radius: 6px; max-width: 80%; white-space: pre-wrap; font-size: 14px; line-height: 1.5; }
  .msg.user { background: #1f6feb33; align-self: flex-end; margin-left: auto; }
  .msg.assistant { background: #1c1c1c; }
  .msg.streaming { border-left: 2px solid #3fb950; }
  footer { padding: 8px 20px; background: #161b22; border-top: 1px solid #30363d; font-size: 12px; color: #8b949e; display: flex; gap: 20px; }
</style>
</head>
<body>
<header>
  <div id="status"></div>
  <h1>Nexus Dashboard</h1>
  <span id="status-text" style="font-size:12px;color:#8b949e">disconnected</span>
</header>
<div class="container">
  <div id="sessions"><div style="padding:12px;color:#8b949e;font-size:13px">No sessions</div></div>
  <div id="conversation">
    <div id="messages"></div>
  </div>
</div>
<footer>
  <span>Input: <strong id="stat-input">0</strong></span>
  <span>Output: <strong id="stat-output">0</strong></span>
  <span>Cache read: <strong id="stat-cache">0</strong></span>
</footer>
<script src="app.js"></script>
</body>
</html>

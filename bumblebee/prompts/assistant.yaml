name: assistant
role: assistant
display_name: Default Assistant
description: ChatSession Tier 2 — Q&A + suggest issues/knowledge with human-in-the-loop.
version: 1

system: |
  You are the Assistant. Conversational interface for human users. Answer
  questions about the project's code, issues, and knowledge base concisely.

  When the user implies they want a new issue or knowledge entry created:
  - ALWAYS use `suggest_issue` / `suggest_knowledge_entry` (the user must approve)
  - NEVER create directly via `create_issue` or `add_knowledge` from chat
  - Phrase as "I can file this as BB-X with these details — approve?"

output_schema:
  type: object
  required: [reply]
  properties:
    reply: { type: string }
    suggested_actions:
      type: array
      items:
        type: object
        properties:
          tool: { type: string }
          arguments: { type: object }
          rationale: { type: string }

tools_allowed:
  - list_issues
  - get_issue
  - search_code
  - query_knowledge
  - suggest_issue
  - suggest_knowledge_entry

budgets:
  wall_min: 10
  tokens_max: 50000
  dollars_max: 0.5

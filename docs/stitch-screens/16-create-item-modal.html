<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ["Inter", "sans-serif"],
                    },
                    colors: {
                        accent: '#f59e0b', // amber-500
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 20;
            font-size: 20px;
        }
        body {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 antialiased">
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
<div class="bg-white w-full max-w-2xl rounded-xl shadow-xl flex flex-col overflow-hidden">
<div class="px-6 py-4 flex items-center justify-between border-b border-gray-100">
<h2 class="text-base font-semibold text-gray-900">Create Work Item</h2>
<button class="text-gray-400 hover:text-gray-600 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<div class="p-6 space-y-5 overflow-y-auto max-h-[calc(100vh-200px)]">
<div class="grid grid-cols-2 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Type</label>
<div class="relative">
<select class="w-full h-10 pl-3 pr-10 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent appearance-none bg-white">
<option value="story">Story</option>
<option value="epic">Epic</option>
<option value="task">Task</option>
<option value="bug">Bug</option>
<option value="feature">Feature</option>
<option value="chore">Chore</option>
<option value="spike">Spike</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Priority</label>
<div class="relative">
<select class="w-full h-10 pl-3 pr-10 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent appearance-none bg-white">
<option value="medium">Medium</option>
<option value="lowest">Lowest</option>
<option value="low">Low</option>
<option value="high">High</option>
<option value="highest">Highest</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Title</label>
<input class="w-full h-10 px-3 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent placeholder:text-gray-400" placeholder="Enter title..." type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Description</label>
<textarea class="w-full p-3 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent placeholder:text-gray-400 resize-none" placeholder="Add a description..." rows="4"></textarea>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Acceptance Criteria</label>
<textarea class="w-full p-3 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent placeholder:text-gray-400 resize-none" placeholder="List requirements for completion..." rows="3"></textarea>
</div>
<div class="grid grid-cols-3 gap-4">
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Parent</label>
<div class="relative">
<select class="w-full h-10 pl-3 pr-10 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent appearance-none bg-white">
<option>None</option>
<option>PROJ-123</option>
<option>PROJ-456</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Sprint</label>
<div class="relative">
<select class="w-full h-10 pl-3 pr-10 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent appearance-none bg-white">
<option>Sprint 24</option>
<option>Sprint 25</option>
<option>Backlog</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Assignee</label>
<div class="relative">
<select class="w-full h-10 pl-3 pr-10 text-sm border-gray-200 rounded-lg focus:ring-accent focus:border-accent appearance-none bg-white">
<option>Alex Rivera</option>
<option>Jordan Smith</option>
<option>Unassigned</option>
</select>
<div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-gray-400">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-medium text-gray-500">Labels</label>
<div class="flex flex-wrap gap-2 p-2 border border-gray-200 rounded-lg min-h-[42px] bg-white">
<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-gray-100 text-gray-700 text-xs font-medium rounded border border-gray-200">
                        backend
                        <button class="hover:text-red-500"><span class="material-symbols-outlined !text-[14px]">close</span></button>
</span>
<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-gray-100 text-gray-700 text-xs font-medium rounded border border-gray-200">
                        auth
                        <button class="hover:text-red-500"><span class="material-symbols-outlined !text-[14px]">close</span></button>
</span>
<button class="text-gray-400 hover:text-accent flex items-center px-1">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
</div>
<div class="px-6 py-4 border-t border-gray-100 flex items-center justify-end gap-3 bg-gray-50/30">
<button class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-200 rounded-lg hover:bg-gray-50 transition-colors">
                Cancel
            </button>
<button class="px-5 py-2 text-sm font-semibold text-white bg-black rounded-lg hover:bg-gray-800 transition-colors shadow-sm">
                Create Item
            </button>
</div>
</div>
</div>

</body></html>

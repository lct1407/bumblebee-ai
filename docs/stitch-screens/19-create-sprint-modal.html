<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Bumblebee Create Sprint Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f59f0a",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221c10",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Background Mockup (to show modal context) -->
<div class="fixed inset-0 z-0 overflow-hidden opacity-40 pointer-events-none">
<div class="layout-container flex h-full grow flex-col">
<div class="px-10 lg:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[960px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-10 py-3">
<div class="flex items-center gap-8">
<div class="flex items-center gap-4">
<div class="size-6 text-primary">
<span class="material-symbols-outlined text-3xl">hive</span>
</div>
<h2 class="text-lg font-bold leading-tight tracking-tight">Bumblebee</h2>
</div>
</div>
<div class="flex flex-1 justify-end gap-4">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
</header>
<div class="p-8">
<div class="h-8 w-48 bg-slate-200 dark:bg-slate-700 rounded mb-6"></div>
<div class="grid grid-cols-3 gap-6">
<div class="h-32 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
<div class="h-32 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
<div class="h-32 bg-slate-100 dark:bg-slate-800 rounded-lg"></div>
</div>
</div>
</div>
</div>
</div>
</div>
<!-- Modal Overlay -->
<div class="fixed inset-0 z-50 bg-black/40 backdrop-blur-sm flex items-start justify-center pt-[10vh] px-4">
<!-- Modal Container -->
<div class="max-w-lg w-full bg-white dark:bg-background-dark rounded-xl shadow-2xl border border-slate-200 dark:border-slate-800 overflow-hidden">
<!-- Header -->
<div class="px-6 py-4 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between bg-white dark:bg-background-dark">
<h2 class="text-lg font-semibold text-slate-900 dark:text-slate-100">Create Sprint</h2>
<button class="p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<!-- Body -->
<div class="px-6 py-6 space-y-5">
<!-- Sprint Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="sprint-name">Sprint Name</label>
<input class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary transition-shadow text-sm placeholder:text-slate-400 dark:placeholder:text-slate-500" id="sprint-name" placeholder="e.g., Sprint 4 - User Dashboard" type="text"/>
</div>
<!-- Sprint Goal -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="sprint-goal">Sprint Goal</label>
<textarea class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary transition-shadow text-sm placeholder:text-slate-400 dark:placeholder:text-slate-500 resize-none" id="sprint-goal" placeholder="What should this sprint achieve?" rows="3"></textarea>
</div>
<!-- Date Range -->
<div class="space-y-1.5">
<div class="grid grid-cols-2 gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="start-date">Start Date</label>
<div class="relative">
<input class="w-full pl-4 pr-10 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary transition-shadow text-sm" id="start-date" type="date"/>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="end-date">End Date</label>
<div class="relative">
<input class="w-full pl-4 pr-10 py-2.5 rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-primary transition-shadow text-sm" id="end-date" type="date"/>
</div>
</div>
</div>
<p class="text-[11px] font-medium text-slate-400 dark:text-slate-500 px-1">
                        Duration: 2 weeks (14 days)
                    </p>
</div>
</div>
<!-- Footer -->
<div class="px-6 py-4 border-t border-slate-200 dark:border-slate-800 flex items-center justify-end gap-3 bg-slate-50 dark:bg-slate-900/50">
<button class="px-4 py-2 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg transition-colors">
                    Cancel
                </button>
<button class="px-5 py-2 text-sm font-semibold bg-primary hover:bg-primary/90 text-background-dark rounded-lg shadow-sm transition-all flex items-center gap-2">
                    Create Sprint
                </button>
</div>
</div>
</div>
</body></html>

name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # Postgres service containers + docker only work on Linux runners.
        # Windows/macOS were causing false failures in matrix.
        os: [ubuntu-latest]
        python: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bumblebee
          POSTGRES_PASSWORD: bumblebee
          POSTGRES_DB: bumblebee
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U bumblebee"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e ./bumblebee-plugin-example
      - name: Migrate DB
        env:
          DATABASE_URL: postgresql+asyncpg://bumblebee:bumblebee@localhost:5433/bumblebee
        run: alembic upgrade head
      - name: Seed
        env:
          DATABASE_URL: postgresql+asyncpg://bumblebee:bumblebee@localhost:5433/bumblebee
        run: bumblebee db seed
      - name: Lint
        run: ruff check bumblebee/
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://bumblebee:bumblebee@localhost:5433/bumblebee
        run: pytest tests/ -v

name: Release to PyPI

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke install
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # cross-platform: find wheel via python glob, not shell glob
          WHEEL=$(python -c "import glob; print(glob.glob('dist/*.whl')[0])")
          echo "Installing: $WHEEL"
          pip install "$WHEEL"
          bumblebee version
          bb version
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.python }}
          path: dist/*

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true   # TestPyPI is best-effort; PyPI still publishes if this fails
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          # Falls back to API token if trusted publishing isn't set up yet.
          # Set TEST_PYPI_API_TOKEN secret (optional).
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    needs: build   # depend on build only; TestPyPI is non-blocking
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publishing
    environment:
      name: pypi-publish
      url: https://pypi.org/project/bumblebee-ai/
    if: ${{ !contains(github.ref_name, '-rc') && !contains(github.ref_name, '-beta') }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          # Falls back to API token if trusted publishing isn't set up yet.
          # Set PYPI_API_TOKEN secret (optional).
          password: ${{ secrets.PYPI_API_TOKEN }}

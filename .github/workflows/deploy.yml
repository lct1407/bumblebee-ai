name: deploy

# CI/CD pipeline:
#   1. Run tests (pytest + playwright smoke)
#   2. Build api + web Docker images, push to GHCR
#   3. SSH into deploy server, pull, run alembic, restart services
#
# Triggers:
#   - push to master      → deploy to production
#   - push to dev/staging → deploy to staging
#   - workflow_dispatch   → manual

on:
  push:
    branches: [master, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [production, staging]
        default: production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/bumblebee-ai
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/bumblebee-web

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bumblebee
          POSTGRES_PASSWORD: bumblebee
          POSTGRES_DB: bumblebee
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U bumblebee"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          pip install -e .
          pip install pytest pytest-asyncio httpx python-dotenv
      - name: Migrate + seed
        env:
          DATABASE_URL: postgresql+asyncpg://bumblebee:bumblebee@localhost:5433/bumblebee
        run: |
          alembic upgrade head
          python -m bumblebee.seeds.seed_default
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://bumblebee:bumblebee@localhost:5433/bumblebee
        run: pytest tests/test_new_modules_smoke.py tests/test_issue_links.py -v

  build:
    name: Build images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build + push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    # Skip auto-deploy unless infra is provisioned (SSH_HOST secret + DEPLOY_ENABLED var).
    # Enable via: Settings -> Variables -> Actions -> DEPLOY_ENABLED=true
    # plus add SSH_HOST / SSH_USER / SSH_PRIVATE_KEY repo secrets.
    if: vars.DEPLOY_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Sync Cloudflare DNS records
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          DOMAIN_API: ${{ secrets.DOMAIN_API }}
          DOMAIN_WEB: ${{ secrets.DOMAIN_WEB }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
        run: bash infra/cloudflare-dns-sync.sh

      - name: Check SSH config exists
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "::error::SSH_HOST secret not configured. Add it under Settings → Secrets → Actions."
            exit 1
          fi
          echo "SSH_HOST configured: ${SSH_HOST:0:3}***"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd /opt/bumblebee
            git fetch origin
            git reset --hard ${GITHUB_SHA}
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f infra/docker-compose.prod.yml run --rm api alembic upgrade head
            sudo systemctl restart bumblebee
            sleep 8
            curl -fsS http://localhost:8000/health/ || (sudo journalctl -u bumblebee --no-pager | tail -50; exit 1)
            echo "✓ deploy ok @ ${GITHUB_SHA}"

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deploy failed @ ${GITHUB_SHA:0:7}"

name: deploy

# CI/CD pipeline:
#   1. Run tests (pytest + playwright smoke)
#   2. Build api + web Docker images, push to GHCR
#   3. SSH into deploy server, pull, run alembic, restart services
#
# Triggers:
#   - push to master      → deploy to production
#   - push to dev/staging → deploy to staging
#   - workflow_dispatch   → manual

on:
  push:
    branches: [master, dev]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [production, staging]
        default: production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/bumblebee-ai
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/bumblebee-web

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bumblebee
          POSTGRES_PASSWORD: bumblebee
          POSTGRES_DB: bumblebee
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U bumblebee"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install deps
        run: |
          pip install -e .
          pip install pytest pytest-asyncio httpx python-dotenv
      - name: Migrate + seed
        env:
          DATABASE_URL: postgresql+asyncpg://bumblebee:bumblebee@localhost:5433/bumblebee
        run: |
          alembic upgrade head
          python -m bumblebee.seeds.seed_default
      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://bumblebee:bumblebee@localhost:5433/bumblebee
        run: pytest tests/test_new_modules_smoke.py tests/test_issue_links.py -v

  build:
    name: Build images
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build + push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:latest
            ${{ env.IMAGE_API }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build + push web image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_WEB }}:latest
            ${{ env.IMAGE_WEB }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Trigger Coolify deploy (${{ github.event.inputs.environment || 'production' }})
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    # Skip auto-deploy unless Coolify webhook is configured.
    # Required: secret COOLIFY_WEBHOOK_URL (full URL incl. /api/v1/deploy?uuid=...).
    # Optional: secret COOLIFY_API_TOKEN (Bearer token for protected deploys).
    # Toggle: Settings -> Variables -> Actions -> DEPLOY_ENABLED=true
    if: vars.DEPLOY_ENABLED == 'true' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check Coolify webhook configured
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ]; then
            echo "::error::COOLIFY_WEBHOOK_URL secret missing. Get it from Coolify -> Application -> Webhooks -> Deploy."
            exit 1
          fi
          echo "Coolify webhook configured: ${COOLIFY_WEBHOOK_URL:0:40}..."

      - name: Pin BB_IMAGE_TAG to commit SHA (busts Coolify :latest digest cache)
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${COOLIFY_API_TOKEN:-}" ] || [ -z "${COOLIFY_APP_UUID:-}" ]; then
            echo "::warning::COOLIFY_APP_UUID or COOLIFY_API_TOKEN missing — skipping SHA pin"
            exit 0
          fi
          # Update BB_IMAGE_TAG env var on the Coolify application
          HTTP=$(curl -sS -o /tmp/cf-env.out -w "%{http_code}" \
            -X PATCH "https://coolify.hubapi.cc/api/v1/applications/${COOLIFY_APP_UUID}/envs" \
            -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36" \
            -d "{\"key\":\"BB_IMAGE_TAG\",\"value\":\"${GIT_SHA}\",\"is_preview\":false,\"is_buildtime\":true,\"is_runtime\":true}")
          echo "← HTTP ${HTTP}"
          cat /tmp/cf-env.out
          echo
          echo "✓ pinned BB_IMAGE_TAG=${GIT_SHA:0:7}"

      - name: Trigger Coolify deploy
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${COOLIFY_API_TOKEN:-}" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer ${COOLIFY_API_TOKEN}")
          else
            AUTH_HEADER=()
          fi
          echo "→ POST ${COOLIFY_WEBHOOK_URL%%\?*}?... (sha=${GIT_SHA:0:7})"
          HTTP=$(curl -sS -o /tmp/coolify.out -w "%{http_code}" -X GET \
            "${AUTH_HEADER[@]}" \
            "${COOLIFY_WEBHOOK_URL}")
          echo "← HTTP ${HTTP}"
          cat /tmp/coolify.out
          if [ "${HTTP}" -lt 200 ] || [ "${HTTP}" -ge 300 ]; then
            echo "::error::Coolify webhook returned ${HTTP}"
            exit 1
          fi
          echo "✓ Coolify deploy triggered for ${GIT_SHA:0:7}"

      - name: Wait for API health (post-deploy)
        env:
          PUBLIC_API_URL: ${{ secrets.PUBLIC_API_URL }}
        run: |
          set -e
          if [ -z "${PUBLIC_API_URL:-}" ]; then
            echo "::warning::PUBLIC_API_URL not set, skipping post-deploy probe"
            exit 0
          fi
          echo "Polling ${PUBLIC_API_URL}/health for up to 5 minutes…"
          for i in $(seq 1 60); do
            if curl -fsS "${PUBLIC_API_URL}/health" >/dev/null; then
              echo "✓ API healthy after ${i}x5s"
              curl -fsS "${PUBLIC_API_URL}/health"
              exit 0
            fi
            sleep 5
          done
          echo "::error::API did not become healthy within 5 minutes"
          exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Coolify deploy failed @ ${GITHUB_SHA:0:7}"
